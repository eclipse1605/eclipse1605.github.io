<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>
      {% if page.title and page.title != "Home" %}
        {{ page.title }} - {{ site.title }}
      {% else %}
        {{ site.title }}
      {% endif %}
    </title>
    <meta name="description" content="{{ page.summary | default: site.description }}">
    <link rel="stylesheet" href="{{ '/assets/css/site.css' | relative_url }}">
    <link id="hljs-style" rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/github.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script>
    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>
    <script>
      (() => {
        const storageKey = "theme-preference";
        const prefersDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
        let storedTheme = null;
        try {
          storedTheme = window.localStorage ? localStorage.getItem(storageKey) : null;
        } catch (error) {
          storedTheme = null;
        }
        // Default to dark if the user hasn't explicitly chosen a theme
        const theme = storedTheme || "dark";
        document.documentElement.dataset.theme = theme;
        document.documentElement.style.colorScheme = theme;
        // Ensure HLJS stylesheet matches the initial theme
        try {
          const hljsLink = document.getElementById('hljs-style');
          if (hljsLink) {
            hljsLink.href = theme === 'dark'
              ? 'https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/github-dark.min.css'
              : 'https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/github.min.css';
          }
        } catch (e) {
          // ignore
        }
      })();
    </script>
  </head>
  <body>
    <div class="page-bg" aria-hidden="true"></div>
    <header class="site-header">
      <div class="container header-inner">
        <a class="brand" href="{{ '/' | relative_url }}">{{ site.title }}</a>
        <div class="header-actions">
          <nav class="site-nav">
            <a href="{{ '/' | relative_url }}#about">About</a>
            <a href="{{ '/blogs/' | relative_url }}">Blogs</a>
            <a href="{{ '/misc/' | relative_url }}">Misc</a>
          </nav>
          <button class="theme-toggle" id="theme-toggle" type="button" aria-label="Toggle dark mode" aria-pressed="false">
            <span class="theme-icon" aria-hidden="true">
              <svg class="icon icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <circle cx="12" cy="12" r="4"></circle>
                <path d="M12 2v2M12 20v2M20 12h2M2 12H4M17.657 6.343l1.414 1.414M4.929 19.071l1.414-1.414M17.657 17.657l1.414-1.414M4.929 4.929L6.343 6.343" stroke-linecap="round" stroke-linejoin="round"></path>
              </svg>
              <svg class="icon icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z" stroke-linecap="round" stroke-linejoin="round"></path>
              </svg>
            </span>
          </button>
        </div>
      </div>
    </header>
    <main class="site-main container">
      {{ content }}
    </main>
    <footer class="site-footer">
      <div class="container footer-inner">
        <span>Copyright {{ site.time | date: "%Y" }} {{ site.author }}.</span>
      </div>
    </footer>
    <script>
      // small helper: wait for a global to exist, then call callback (bounded attempts)
      const waitForGlobal = (testFn, cb, attempts = 20, interval = 150) => {
        let tries = 0;
        const id = setInterval(() => {
          try {
            if (testFn()) {
              clearInterval(id);
              cb();
              return;
            }
          } catch (e) {
            // ignore and retry
          }
          if (++tries >= attempts) clearInterval(id);
        }, interval);
      };

      document.addEventListener("DOMContentLoaded", () => {
        const storageKey = "theme-preference";
        const toggle = document.querySelector(".theme-toggle");
        const root = document.documentElement;

        const setHljsTheme = (theme) => {
          const hljsLink = document.getElementById('hljs-style');
          if (hljsLink) {
            hljsLink.href = theme === 'dark'
              ? 'https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/github-dark.min.css'
              : 'https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/github.min.css';
          }
        };

        const syncToggle = () => {
          const isDark = root.dataset.theme === "dark";
          if (toggle) {
            toggle.setAttribute("aria-pressed", String(isDark));
            const sun = toggle.querySelector('.icon-sun');
            const moon = toggle.querySelector('.icon-moon');
            if (sun && moon) {
              sun.style.display = isDark ? 'none' : 'inline-block';
              moon.style.display = isDark ? 'inline-block' : 'none';
            }
          }
        };

        if (toggle) {
          toggle.addEventListener("click", () => {
            const nextTheme = root.dataset.theme === "dark" ? "light" : "dark";
            root.dataset.theme = nextTheme;
            root.style.colorScheme = nextTheme;
            try {
              localStorage.setItem(storageKey, nextTheme);
            } catch (error) {
              // ignore
            }
            setHljsTheme(nextTheme);
            // re-run hljs to repaint tokens if available
            if (window.hljs && typeof hljs.highlightAll === 'function') {
              hljs.highlightAll();
            }
            syncToggle();
          });
        }

        syncToggle();

        // Render math when KaTeX auto-render becomes available
        waitForGlobal(() => window.renderMathInElement, () => {
          try {
            renderMathInElement(document.body, {
              delimiters: [
                { left: "$$", right: "$$", display: true },
                { left: "$", right: "$", display: false },
                { left: "\\(", right: "\\)", display: false },
                { left: "\\[", right: "\\]", display: true }
              ],
              throwOnError: false,
              strict: "ignore",
              processEscapes: true,
              ignoredClasses: ["katex"],
              ignoredTags: ["script", "noscript", "style", "textarea", "pre", "code"]
            });
          } catch (e) {
            // noop
          }
        }, 40, 200);

        // Highlight static code blocks when hljs is available
        waitForGlobal(() => window.hljs, () => {
          try {
            if (typeof hljs.highlightAll === 'function') hljs.highlightAll();
          } catch (e) {}
        }, 40, 200);
      });
    </script>
  </body>
</html>
