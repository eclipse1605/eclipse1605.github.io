<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>
      {% if page.title and page.title != "Home" %}
        {{ page.title }} - {{ site.title }}
      {% else %}
        {{ site.title }}
      {% endif %}
    </title>
    <meta name="description" content="{{ page.summary | default: site.description }}">
    <link rel="stylesheet" href="{{ '/assets/css/site.css' | absolute_url }}">
  </head>
  <body>
    <div class="page-bg" aria-hidden="true"></div>
    <header class="site-header">
      <div class="container header-inner">
        <a class="brand" href="{{ '/' | relative_url }}">{{ site.title }}</a>
        <nav class="site-nav">
          <a href="{{ '/' | relative_url }}#about">About</a>
          <a href="{{ '/' | relative_url }}#blogs">Blogs</a>
          <a href="{{ '/misc/' | relative_url }}">Misc</a>
        </nav>
      </div>
    </header>
    <main class="site-main container">
      {{ content }}
    </main>
    <footer class="site-footer">
      <div class="container footer-inner">
        <span>Copyright {{ site.time | date: "%Y" }} {{ site.author }}.</span>
        <span>Built for GSoC.</span>
      </div>
    </footer>
    {% if page.math %}
      <script>
        window.MathJax = {
          tex: {
            inlineMath: [["$", "$"]],
            displayMath: [["$$", "$$"]]
          }
        };
      </script>
      <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    {% endif %}
  </body>
</html>
