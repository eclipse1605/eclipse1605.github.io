<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>
      {% if page.title and page.title != "Home" %}
        {{ page.title }} - {{ site.title }}
      {% else %}
        {{ site.title }}
      {% endif %}
    </title>
    <meta name="description" content="{{ page.summary | default: site.description }}">
    <link rel="stylesheet" href="{{ '/assets/css/site.css' | relative_url }}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
  </head>
  <body>
    <div class="page-bg" aria-hidden="true"></div>
    <header class="site-header">
      <div class="container header-inner">
        <a class="brand" href="{{ '/' | relative_url }}">{{ site.title }}</a>
        <nav class="site-nav">
          <a href="{{ '/' | relative_url }}#about">About</a>
          <a href="{{ '/' | relative_url }}#blogs">Blogs</a>
          <a href="{{ '/misc/' | relative_url }}">Misc</a>
        </nav>
      </div>
    </header>
    <main class="site-main container">
      {{ content }}
    </main>
    <footer class="site-footer">
      <div class="container footer-inner">
        <span>Copyright {{ site.time | date: "%Y" }} {{ site.author }}.</span>
        <span>Built for GSoC.</span>
      </div>
    </footer>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        if (window.renderMathInElement) {
          renderMathInElement(document.body, {
            delimiters: [
              { left: "$$", right: "$$", display: true },
              { left: "$", right: "$", display: false },
              { left: "\\(", right: "\\)", display: false },
              { left: "\\[", right: "\\]", display: true }
            ],
            throwOnError: false,
            ignoredTags: ["script", "noscript", "style", "textarea", "pre", "code"]
          });
        }
      });
    </script>
  </body>
</html>
